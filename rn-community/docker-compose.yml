version: "3.8"
name: rn-community

# 워크트리별 Metro 번들러 환경
# 사용법:
#   전체 실행: docker compose up
#   특정 실행: docker compose up rn1
#   로그 확인: docker compose logs -f rn1
#   중지:      docker compose stop rn1
#
# 포트:
#   rn1 → http://localhost:18080  (worktrees/rn-community1)
#   rn2 → http://localhost:18081  (worktrees/rn-community2)
#   rn3 → http://localhost:18082  (worktrees/rn-community3)
#   rn4 → http://localhost:18083  (worktrees/rn-community4)

services:
  rn1:
    container_name: rn-community1
    build: .
    image: oseongryu/rn-community-metro:1.0.0
    volumes:
      - ~/git/rn-community.worktrees/rn-community1:/app
      - rn1_modules:/app/node_modules
    ports:
      - "18080:8000"
    environment:
      - TZ=Asia/Seoul
      - PORT=8000
    restart: unless-stopped
    stdin_open: true
    tty: true

  rn2:
    container_name: rn-community2
    build: .
    image: oseongryu/rn-community-metro:1.0.0
    volumes:
      - ~/git/rn-community.worktrees/rn-community2:/app
      - rn2_modules:/app/node_modules
    ports:
      - "18081:8000"
    environment:
      - TZ=Asia/Seoul
      - PORT=8000
    restart: unless-stopped
    stdin_open: true
    tty: true

  rn3:
    container_name: rn-community3
    build: .
    image: oseongryu/rn-community-metro:1.0.0
    volumes:
      - ~/git/rn-community.worktrees/rn-community3:/app
      - rn3_modules:/app/node_modules
    ports:
      - "18082:8000"
    environment:
      - TZ=Asia/Seoul
      - PORT=8000
    restart: unless-stopped
    stdin_open: true
    tty: true

  rn4:
    container_name: rn-community4
    build: .
    image: oseongryu/rn-community-metro:1.0.0
    volumes:
      - ~/git/rn-community.worktrees/rn-community4:/app
      - rn4_modules:/app/node_modules
    ports:
      - "18083:8000"
    environment:
      - TZ=Asia/Seoul
      - PORT=8000
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  rn1_modules:
  rn2_modules:
  rn3_modules:
  rn4_modules:
